global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Scrape the RAG API's /metrics endpoint
  - job_name: "rag-api"
    static_configs:
      - targets:
          - "api:8000"
    metrics_path: "/metrics"
    scrape_interval: 15s

  # Scrape Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets:
          - "localhost:9090"
